<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Login, Advik Learning Centre</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#3a2414" />
  <link rel="icon" href="assets/advik-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">
        <span class="brand-text"><strong>ADVIK</strong><small>Learning Centre</small></span>
      </a>
      <nav class="nav-links">
        <a href="index.html">← Back to website</a>
      </nav>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="portal-narrow">
        <div class="text-center">
          <span class="section-kicker">Parent Portal</span>
          <h1 class="section-title" style="font-size:1.9rem;">Parent Login</h1>
          <div class="ornament"><span>✦</span></div>
        </div>

        <div class="form-card">
          <div id="msg"></div>
          <form id="login-form">
            <div class="field">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required autocomplete="username" placeholder="you@example.com" />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Your password" />
            </div>
            <button type="submit" id="submit-btn" class="btn btn--primary" style="width:100%; justify-content:center;">Log In</button>
          </form>
          <p class="text-center mt-2" style="font-size:0.88rem; color:var(--muted);">
            Login details are provided by Advik Learning Centre.<br/>
          </p>
        </div>
      </div>
    </div>
  </section>

  <script type="module">
    import { auth } from "./js/firebase-config.js";
    import {
      signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const form = document.getElementById("login-form");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("submit-btn");

    function showMsg(text, type) {
      msg.innerHTML = '<div class="alert alert--' + type + '">' + text + "</div>";
    }

    // If already signed in, go straight to the dashboard.
    onAuthStateChanged(auth, function (user) {
      if (user) window.location.replace("dashboard.html");
    });

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      btn.disabled = true; btn.textContent = "Logging in…";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.replace("dashboard.html");
      } catch (err) {
        let m = "Login failed. Please check your email and password.";
        if (err.code === "auth/invalid-email") m = "That email address looks invalid.";
        if (err.code === "auth/too-many-requests") m = "Too many attempts. Please try again later.";
        showMsg(m, "error");
        btn.disabled = false; btn.textContent = "Log In";
      }
    });

    document.getElementById("reset-link").addEventListener("click", async function (e) {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      if (!email) { showMsg("Enter your email above first, then click reset.", "info"); return; }
      try {
        await sendPasswordResetEmail(auth, email);
        showMsg("Password reset email sent to " + email + ".", "ok");
      } catch (err) {
        showMsg("Could not send reset email. Please contact the centre.", "error");
      }
    });
  </script>
</body>
</html>
